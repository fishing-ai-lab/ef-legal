<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>이지피싱 - 법률 문서</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, 'Noto Sans KR', sans-serif;
      line-height: 1.8;
      color: #333;
      background: #f8f9fa;
    }
    .container {
      max-width: 720px;
      margin: 0 auto;
      padding: 80px 24px;
      background: #fff;
      min-height: 100vh;
      text-align: center;
    }
    h1 {
      font-size: 28px;
      color: #1a1a1a;
      margin-bottom: 8px;
    }
    .subtitle {
      color: #666;
      font-size: 16px;
      margin-bottom: 48px;
    }
    .links {
      display: flex;
      flex-direction: column;
      gap: 16px;
      max-width: 320px;
      margin: 0 auto;
    }
    .links a {
      display: block;
      padding: 16px 24px;
      background: #2563eb;
      color: #fff;
      text-decoration: none;
      border-radius: 8px;
      font-size: 16px;
      font-weight: 500;
      transition: background 0.2s;
    }
    .links a:hover {
      background: #1d4ed8;
    }
    .contact {
      margin-top: 48px;
      color: #999;
      font-size: 14px;
    }
    .contact a { color: #2563eb; text-decoration: none; }
  </style>
</head>
<body>
  <div class="container">
    <h1>이지피싱</h1>
    <p class="subtitle">EasyFishing - 낚시 통합 플랫폼</p>
    <div class="links">
      <a href="./privacy.html">개인정보처리방침</a>
      <a href="./terms.html">이용약관</a>
    </div>
    <p class="contact">문의: <a href="mailto:fishing.ai.lab@gmail.com">fishing.ai.lab@gmail.com</a></p>
  </div>
</body>
</html>
